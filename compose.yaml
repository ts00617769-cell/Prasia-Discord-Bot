version: '3.8'
services:
  dc-bot:
    image: python:3.12-slim
    container_name: prasia-bot-final
    restart: always
    volumes:
      - /volume1/docker/dc_bot:/app
    # 👇 關鍵魔法在這裡：告訴 Docker 直接去吃同一個資料夾下的 .env 檔案
    env_file:
      - .env
    environment:
      - TZ=Asia/Taipei
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python bot.py"
